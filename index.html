<!DOCTYPE html>
<html>
  <head>
    <title>Polymod Meta Generator</title>
    <script src="FileSaver.min.js"></script>
    <script>
      class PolymodMeta {
        constructor(modName, modDesc, modHome, modContributors, modApi, modVer) {
          return {
            title: modName,
            description: modDesc,
            homepage: modHome,
            contributors: modContributors,
            api_version: modApi,
            mod_version: modVer,
            license: 'Apache-2.0'
          }
        }
      }
    </script>
  </head>
  <body>
    <div>
      <legend><h2>Polymod Meta Generator</h2></legend>
      <input id="modName" placeholder="Mod name">
    </div>
  </body>
</html>
