<!DOCTYPE html>
<html>
  <head>
    <title>Polymod Meta Generator</title>
    <style>
      input {
        margin-bottom: 10px;
      }
    </style>
    <script src="jquery-4.0.0.min.js"></script>
    <script src="FileSaver.min.js"></script>
  </head>
  <body>
    <fieldset>
      <legend><h2>Polymod Meta Generator</h2></legend>
      <input id="modName" placeholder="Mod name">
      <input id="modDesc" placeholder="Mod description">
      <br>
      <input id="modHome" placeholder="Mod homepage">
      <input id="modContributors" placeholder="Mod contributors">
      <button id="download">Download</button>
    </div>
    <script>
      class PolymodMeta {
        constructor(modName, modDesc, modHome, modContributors, modApi, modVer) {
          return {
            title: modName,
            description: modDesc,
            homepage: modHome,
            contributors: modContributors,
            api_version: modApi,
            mod_version: modVer,
            license: 'Apache-2.0'
          }
        }
      }

      $('#download').addEventListener('click', () => {
        const meta = new PolymodMeta(
          $('#modName').value,
          $('#modDesc').value,
          $('#modHome').value,
          [{name: 'someone', role: 'something'}],
          '0.8.0',
          '1.0.0'
        );
        const file = new File([JSON.stringify(meta)], '_polymod_meta.json');
        saveAs(file);
      })
    </script>
  </body>
</html>
