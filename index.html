<!DOCTYPE html>
<html>
  <head>
    <title>Polymod Meta Generator</title>
    <style>
      input {
        margin-bottom: 10px;
      }
    </style>
    <script src="jquery-4.0.0.min.js"></script>
    <script src="FileSaver.min.js"></script>
    <script src="main.js"></script>
  </head>
  <body>
    <fieldset>
      <legend><h2>Polymod Meta Generator</h2></legend>
      <input id="modName" placeholder="Mod name">
      <input id="modDesc" placeholder="Mod description">

      <button id="download">Download</button>
    </div>
  </body>
</html>
